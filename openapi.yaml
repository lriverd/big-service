  /spots/{id}/status:
    patch:
      tags: [Moderation]
      summary: Cambiar el estado de moderación de un spot (solo admin)
      operationId: updateSpotStatus
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [VERIFIED, HIDDEN, DELETED]
                reason:
                  type: string
      responses:
        '200':
          description: Spot con el nuevo estado. PENDING→VERIFIED otorga reputación al dueño; HIDDEN/DELETED se la resta; restaurar un HIDDEN a VERIFIED no afecta la reputación.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Spot'

